
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Contabilità</title>
</head>
<body>
  <h1>Contabilità</h1>
  <div id="riepilogo"></div>

  <script>
    fetch('dati/contabilita.json')
      .then(res => res.json())
      .then(data => {
        let entrate = [], uscite = [];
        if (Array.isArray(data)) {
          entrate = data.filter(d => d.tipo === "Entrata");
          uscite = data.filter(d => d.tipo === "Uscita");
        } else {
          entrate = data.Entrata || [];
          uscite = data.Uscita || [];
        }

        let totaleEntrate = entrate.reduce((sum, m) => sum + parseFloat(m.totale || 0), 0);
        let totaleUscite = uscite.reduce((sum, m) => sum + parseFloat(m.totale || 0), 0);
        let saldo = totaleEntrate - totaleUscite;

        const container = document.getElementById("riepilogo");
        container.innerHTML = `
          <p><strong>Entrate Totali:</strong> € ${totaleEntrate.toFixed(2)}</p>
          <p><strong>Uscite Totali:</strong> € ${totaleUscite.toFixed(2)}</p>
          <p><strong>Saldo:</strong> € ${saldo.toFixed(2)}</p>
        `;
      });
  </script>
</body>
</html>
