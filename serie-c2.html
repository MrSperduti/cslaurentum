
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Giocatori Serie C2</title>
</head>
<body>
  <h1>Giocatori Serie C2</h1>
  <div id="elencoGiocatori"></div>
  <script>
    fetch('dati/giocatori.json')
      .then(res => res.json())
      .then(data => {
        const giocatori = Array.isArray(data) ? data : data.giocatori || [];
        const elenco = document.getElementById("elencoGiocatori");
        const filtrati = giocatori.filter(g => g.categoria === "Serie C2");
        if (filtrati.length === 0) {
          elenco.innerHTML = "<p>Nessun giocatore presente.</p>";
          return;
        }
        filtrati.forEach((g, i) => {
          const div = document.createElement("div");
          div.innerHTML = `<p><strong>${g.nome} ${g.cognome}</strong> - ${g.categoria}</p>`;
          elenco.appendChild(div);
        });
      });
  </script>
</body>
</html>
