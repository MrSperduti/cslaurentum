
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Giocatori Serie C2</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <h1>Giocatori Serie C2</h1>
    <div id="elencoGiocatori"></div>
    <button onclick="location.href='index.html'">Torna alla Home</button>
  </div>
  <script>
fetch('dati/giocatori.json')
  .then(res => res.json())
  .then(giocatori => {
    const elenco = document.getElementById("elencoGiocatori");
    giocatori.forEach((g, index) => {
      if (g.categoria === "Serie C2") {
        const div = document.createElement("div");
        div.innerHTML = `<p><a href="giocatore.html?id=${index}">${g.nome} ${g.cognome}</a></p>`;
        elenco.appendChild(div);
      }
    });
  });
</script>
</body>
</html>
